services:
  db:
    image: pgvector/pgvector:pg16-trixie
    container_name: project3-db
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_NAME}"
    volumes:
      - vector_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: app/Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_NAME: "${DB_NAME}"

    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - db

volumes:
  vector_data: